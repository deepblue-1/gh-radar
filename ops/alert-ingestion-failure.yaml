displayName: "gh-radar-ingestion-failure"
documentation:
  content: |
    Cloud Run Job `gh-radar-ingestion` 실행이 최근 5분 내 실패했습니다.
    - Cloud Logging에서 `jsonPayload.msg="cycle failed"` 확인
    - KIS API(EGW00201 rate limit) / Supabase 접근 / task_timeout 초과 여부 점검
    - Runbook: .planning/phases/05.1-ingestion-cloud-run-job-cloud-scheduler-kis/05.1-DEPLOY-LOG.md §운영 참고
  mimeType: text/markdown
combiner: OR
conditions:
  - displayName: "gh-radar-ingestion 실행 실패 발생"
    conditionThreshold:
      filter: |
        resource.type = "cloud_run_job"
        AND resource.labels.job_name = "gh-radar-ingestion"
        AND metric.type = "run.googleapis.com/job/completed_execution_count"
        AND metric.labels.result = "failed"
      comparison: COMPARISON_GT
      thresholdValue: 0
      duration: 0s
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_SUM
alertStrategy:
  autoClose: 3600s
notificationChannels:
  - "${NOTIFICATION_CHANNEL_ID}"
